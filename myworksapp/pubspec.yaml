name: myworksapp
description: App Flutter para conectar usuarios con trabajadores de oficios — perfiles, portafolio y gestión de trabajos con Supabase.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9

  # Estado y navegación
  flutter_riverpod: ^2.4.9
  go_router: ^13.0.0

  # Utilidades
  path: ^1.8.3
  intl: ^0.18.1
  uuid: ^4.2.1
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2

  # Mapas y Geolocalización
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  url_launcher: ^6.2.2

  # Notificaciones
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.2

  # Imágenes
  cached_network_image: ^3.3.1
  image_picker: ^1.0.5
  flutter_image_compress: ^2.1.0

  # Calendario
  table_calendar: ^3.0.9

  # Validación
  email_validator: ^2.1.17
  
  # Seguridad
  crypto: ^3.0.3
  bcrypt: ^1.1.3
  flutter_secure_storage: ^9.0.0
  
  # Logging
  logger: ^2.0.2+1
  
  # Monitoreo
  # Firebase deshabilitado - descomentar si se necesita en el futuro
  # firebase_core: ^2.24.2
  # firebase_crashlytics: ^3.4.9
  
  # Permisos
  permission_handler: ^11.3.0
  
  # Compartir/Exportar
  share_plus: ^7.2.1
  
  # Info de app
  package_info_plus: ^5.0.1
  supabase_flutter: ^2.8.4
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  video_player: ^2.11.1
  video_player_win: ^3.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/videos/
